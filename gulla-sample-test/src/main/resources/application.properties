# Default Profile (uses dev settings)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Application Name
spring.application.name=linkedin-easy-apply-automation

# Server Configuration
server.port=${SERVER_PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Application Configuration
easyapply.match-threshold=0.70
easyapply.automation-timeout-ms=15000
easyapply.max-retry-attempts=3
easyapply.candidate-data-root=${EASYAPPLY_CANDIDATE_DATA_ROOT:candidate-data}
