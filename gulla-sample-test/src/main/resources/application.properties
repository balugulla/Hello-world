# Default Profile (uses dev settings)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Application Name
spring.application.name=linkedin-easy-apply-automation

# Server Configuration
server.port=${SERVER_PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# Application Configuration
easyapply.match-threshold=0.70
easyapply.automation-timeout-ms=15000
easyapply.max-retry-attempts=3
