# Development Profile
spring.datasource.url=jdbc:h2:mem:easyapplydb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.h2.console.enabled=true

# Application Configuration
easyapply.match-threshold=0.70
easyapply.automation-timeout-ms=15000
easyapply.max-retry-attempts=3
easyapply.candidate-data-root=target/candidate-data

# Logging
logging.level.org.gulla.service.gulla=DEBUG
logging.level.org.springframework.web=DEBUG
