# Production Profile
# Database configuration - should be overridden with environment variables
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/easyapply}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.******
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.h2.console.enabled=false

# Application Configuration
easyapply.match-threshold=${MATCH_THRESHOLD:0.75}
easyapply.automation-timeout-ms=30000
easyapply.max-retry-attempts=3

# Security
easyapply.api.key=${API_KEY}

# Logging
logging.level.org.gulla.service.gulla=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
